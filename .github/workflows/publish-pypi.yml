name: Publish to PyPI

on:
  release:
    types:
      - published

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Resolve package version
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("openbb_adanos/__init__.py").read_text(encoding="utf-8")
          print(re.search(r'__version__\s*=\s*"([^"]+)"', text).group(1))
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          TAG="${{ github.event.release.tag_name }}"
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Release tag must use SemVer and start with v. Got: $TAG"
            exit 1
          fi

          TAG_VERSION="${TAG#v}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "Release tag version ($TAG_VERSION) does not match package version ($VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest twine openbb-core httpx pydantic
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Smoke install built package
        run: |
          python -m venv /tmp/openbb-adanos-release-smoke
          /tmp/openbb-adanos-release-smoke/bin/pip install dist/openbb_adanos-*.whl
          /tmp/openbb-adanos-release-smoke/bin/python - <<'PY'
          from openbb_adanos import AdanosClient, __version__

          assert __version__
          client = AdanosClient(api_key="sk_live_example")
          assert client.reddit is not None
          assert client.polymarket is not None
          client.close()
          PY

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
